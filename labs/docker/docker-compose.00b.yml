# Session 00b — brings up the FastAPI chat service and a pgvector database.
# Usage: docker compose -f labs/docker/docker-compose.00b.yml up --build
services:
  api:
    build:
      context: ../..
      dockerfile: labs/docker/Dockerfile.00b
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agentic
      POSTGRES_USER: agentic
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
